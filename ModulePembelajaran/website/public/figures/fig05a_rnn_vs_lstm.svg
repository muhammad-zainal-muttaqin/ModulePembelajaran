<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="ui-sans-serif,system-ui,sans-serif">
  <rect width="880" height="420" fill="#F9FAFB" rx="12"/>
  <text x="440" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">RNN Vanilla vs LSTM Cell</text>
  <text x="440" y="46" text-anchor="middle" font-size="10" fill="#6B7280">LSTM menambahkan cell state dan tiga gate untuk memutus rantai vanishing gradient</text>

  <!-- === RNN Vanilla === -->
  <rect x="20" y="60" width="380" height="340" rx="8" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <rect x="20" y="60" width="380" height="36" rx="8" fill="#92400E"/>
  <rect x="20" y="84" width="380" height="12" fill="#92400E"/>
  <text x="210" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="white">RNN Vanilla</text>

  <!-- Unrolled RNN cells -->
  <g transform="translate(50, 120)">
    <!-- t=1 -->
    <rect x="0" y="0" width="80" height="60" rx="8" fill="#FCD34D" stroke="#D97706" stroke-width="1.5"/>
    <text x="40" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#78350F">tanh</text>
    <text x="40" y="45" text-anchor="middle" font-size="9" fill="#92400E">W_h·h + W_x·x</text>
    <text x="40" y="-10" text-anchor="middle" font-size="10" fill="#78350F" font-weight="600">t=1</text>

    <!-- t=2 -->
    <rect x="130" y="0" width="80" height="60" rx="8" fill="#FCD34D" stroke="#D97706" stroke-width="1.5"/>
    <text x="170" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#78350F">tanh</text>
    <text x="170" y="45" text-anchor="middle" font-size="9" fill="#92400E">W_h·h + W_x·x</text>
    <text x="170" y="-10" text-anchor="middle" font-size="10" fill="#78350F" font-weight="600">t=2</text>

    <!-- t=3 -->
    <rect x="260" y="0" width="80" height="60" rx="8" fill="#FCD34D" stroke="#D97706" stroke-width="1.5"/>
    <text x="300" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#78350F">tanh</text>
    <text x="300" y="45" text-anchor="middle" font-size="9" fill="#92400E">W_h·h + W_x·x</text>
    <text x="300" y="-10" text-anchor="middle" font-size="10" fill="#78350F" font-weight="600">t=3</text>

    <!-- Hidden state arrows -->
    <path d="M80 30 L130 30" stroke="#D97706" stroke-width="2" marker-end="url(#arrowB)"/>
    <path d="M210 30 L260 30" stroke="#D97706" stroke-width="2" marker-end="url(#arrowB)"/>

    <!-- h labels -->
    <text x="105" y="22" text-anchor="middle" font-size="9" fill="#92400E">h₁</text>
    <text x="235" y="22" text-anchor="middle" font-size="9" fill="#92400E">h₂</text>

    <!-- Input arrows -->
    <path d="M40 80 L40 60" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrowB)"/>
    <path d="M170 80 L170 60" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrowB)"/>
    <path d="M300 80 L300 60" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrowB)"/>
    <text x="40" y="95" text-anchor="middle" font-size="9" fill="#92400E">x₁</text>
    <text x="170" y="95" text-anchor="middle" font-size="9" fill="#92400E">x₂</text>
    <text x="300" y="95" text-anchor="middle" font-size="9" fill="#92400E">x₃</text>

    <!-- Output arrows -->
    <path d="M40 60 L40 130" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowB)"/>
    <path d="M170 60 L170 130" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowB)"/>
    <path d="M300 60 L300 130" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowB)"/>
    <text x="40" y="145" text-anchor="middle" font-size="9" fill="#92400E">y₁</text>
    <text x="170" y="145" text-anchor="middle" font-size="9" fill="#92400E">y₂</text>
    <text x="300" y="145" text-anchor="middle" font-size="9" fill="#92400E">y₃</text>
  </g>

  <!-- RNN gradient chain -->
  <g transform="translate(50, 290)">
    <text x="170" y="0" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">Gradient chain (BPTT):</text>
    <text x="170" y="18" text-anchor="middle" font-size="9" fill="#6B7280">∂L/∂h₁ = ∂L/∂h₃ · W_h · W_h → menyusut eksponensial</text>
    <rect x="20" y="28" width="300" height="24" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
    <text x="170" y="44" text-anchor="middle" font-size="9" font-weight="600" fill="#92400E">|W_h| &lt; 1 → vanishing | |W_h| &gt; 1 → exploding</text>
  </g>

  <!-- === LSTM === -->
  <rect x="440" y="60" width="420" height="340" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <rect x="440" y="60" width="420" height="36" rx="8" fill="#1D4ED8"/>
  <rect x="440" y="84" width="420" height="12" fill="#1D4ED8"/>
  <text x="650" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="white">LSTM Cell</text>

  <!-- LSTM Cell Detail -->
  <g transform="translate(470, 110)">
    <!-- Cell boundary -->
    <rect x="0" y="0" width="340" height="160" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4"/>

    <!-- Cell state highway -->
    <path d="M-10 80 L350 80" stroke="#1D4ED8" stroke-width="3" opacity="0.3"/>
    <text x="320" y="75" text-anchor="end" font-size="9" font-weight="600" fill="#1D4ED8">c_t (cell state highway)</text>

    <!-- Forget gate -->
    <rect x="20" y="20" width="60" height="40" rx="6" fill="#FCD34D" stroke="#D97706" stroke-width="1.5"/>
    <text x="50" y="38" text-anchor="middle" font-size="10" font-weight="700" fill="#78350F">σ</text>
    <text x="50" y="52" text-anchor="middle" font-size="8" fill="#92400E">forget</text>
    <path d="M-10 40 L20 40" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrowB)"/>
    <path d="M50 80 L50 60" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrowB)"/>
    <text x="50" y="14" text-anchor="middle" font-size="8" fill="#6B7280">f_t</text>

    <!-- Multiply (forget) -->
    <circle cx="80" cy="80" r="12" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <text x="80" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">⊙</text>

    <!-- Input gate -->
    <rect x="130" y="20" width="60" height="40" rx="6" fill="#A7F3D0" stroke="#059669" stroke-width="1.5"/>
    <text x="160" y="38" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">σ</text>
    <text x="160" y="52" text-anchor="middle" font-size="8" fill="#065F46">input</text>
    <text x="160" y="14" text-anchor="middle" font-size="8" fill="#6B7280">i_t</text>

    <!-- Cell update -->
    <rect x="130" y="100" width="60" height="40" rx="6" fill="#C4B5FD" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="160" y="118" text-anchor="middle" font-size="10" font-weight="700" fill="#4C1D95">tanh</text>
    <text x="160" y="132" text-anchor="middle" font-size="8" fill="#4C1D95">g_t</text>

    <!-- Multiply (input) -->
    <circle cx="200" cy="80" r="12" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
    <text x="200" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">⊙</text>

    <!-- Add -->
    <circle cx="240" cy="80" r="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="240" y="84" text-anchor="middle" font-size="14" font-weight="700" fill="#1D4ED8">+</text>

    <!-- Output gate -->
    <rect x="260" y="20" width="60" height="40" rx="6" fill="#FCA5A5" stroke="#DC2626" stroke-width="1.5"/>
    <text x="290" y="38" text-anchor="middle" font-size="10" font-weight="700" fill="#991B1B">σ</text>
    <text x="290" y="52" text-anchor="middle" font-size="8" fill="#991B1B">output</text>
    <text x="290" y="14" text-anchor="middle" font-size="8" fill="#6B7280">o_t</text>

    <!-- tanh(c) -->
    <rect x="260" y="100" width="60" height="40" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="290" y="118" text-anchor="middle" font-size="10" font-weight="700" fill="#4C1D95">tanh</text>
    <text x="290" y="132" text-anchor="middle" font-size="8" fill="#4C1D95">tanh(c)</text>

    <!-- Multiply (output) -->
    <circle cx="320" cy="80" r="12" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="320" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#991B1B">⊙</text>

    <!-- Connections -->
    <path d="M80 80 L120 80" stroke="#3B82F6" stroke-width="1.5"/>
    <path d="M160 60 L160 100" stroke="#059669" stroke-width="1.2"/>
    <path d="M200 80 L228 80" stroke="#3B82F6" stroke-width="1.5"/>
    <path d="M240 80 L308 80" stroke="#3B82F6" stroke-width="1.5"/>
    <path d="M290 60 L290 100" stroke="#DC2626" stroke-width="1.2"/>
    <path d="M290 120 L320 92" stroke="#7C3AED" stroke-width="1.2"/>

    <!-- Output h_t -->
    <path d="M332 80 L350 80" stroke="#1D4ED8" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="355" y="84" font-size="10" font-weight="600" fill="#1D4ED8">h_t</text>
  </g>

  <!-- LSTM gradient path -->
  <g transform="translate(470, 290)">
    <text x="170" y="0" text-anchor="middle" font-size="10" font-weight="600" fill="#1D4ED8">Gradient path (cell state):</text>
    <text x="170" y="18" text-anchor="middle" font-size="9" fill="#6B7280">∂c_t/∂c_{t-1} = f_t → gate ≈ 1 → gradient tetap stabil</text>
    <rect x="20" y="28" width="300" height="24" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="170" y="44" text-anchor="middle" font-size="9" font-weight="600" fill="#1D4ED8">Cell state = highway gradient tanpa perkalian matriks berulang</text>
  </g>

  <defs>
    <marker id="arrowB" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#92400E"/>
    </marker>
    <marker id="arrowBlue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1D4ED8"/>
    </marker>
  </defs>
</svg>
