<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="ui-sans-serif,system-ui,sans-serif">
  <rect width="900" height="600" fill="#FAFAFA" rx="12"/>
  <text x="450" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Peta Modul Pembelajaran: 11 Minggu Bootcamp + 4 Minggu Capstone</text>
  <text x="450" y="44" text-anchor="middle" font-size="10" fill="#6B7280">Panah = prereq. Baca sesuai urutan W1→W11, lalu Capstone W12-W15.</text>

  <!-- Week labels on left -->
  <text x="14" y="100" font-size="8" fill="#9CA3AF" transform="rotate(-90,14,110)">Minggu 1-2</text>
  <text x="14" y="220" font-size="8" fill="#9CA3AF" transform="rotate(-90,14,230)">Minggu 3-4</text>
  <text x="14" y="340" font-size="8" fill="#9CA3AF" transform="rotate(-90,14,350)">Minggu 5-8</text>
  <text x="14" y="460" font-size="8" fill="#9CA3AF" transform="rotate(-90,14,470)">Minggu 9-15</text>

  <!-- Horizontal dividers -->
  <line x1="40" y1="160" x2="860" y2="160" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="40" y1="280" x2="860" y2="280" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="40" y1="400" x2="860" y2="400" stroke="#F3F4F6" stroke-width="1"/>

  <!-- ROW 1: Foundation (W1-W2) -->
  <rect x="280" y="62" width="160" height="75" rx="8" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  <text x="360" y="82" text-anchor="middle" font-size="10" font-weight="700" fill="#F8FAFC">W1</text>
  <text x="360" y="98" text-anchor="middle" font-size="9" fill="#94A3B8">Tabular &amp; Output Heads</text>
  <text x="360" y="112" text-anchor="middle" font-size="7" fill="#64748B">MLP, loss matching</text>
  <text x="360" y="126" text-anchor="middle" font-size="7" fill="#64748B">observasi sebelum kesimpulan</text>

  <rect x="460" y="62" width="160" height="75" rx="8" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  <text x="540" y="82" text-anchor="middle" font-size="10" font-weight="700" fill="#F8FAFC">W2</text>
  <text x="540" y="98" text-anchor="middle" font-size="9" fill="#94A3B8">Images, CNN &amp; Smoke Test</text>
  <text x="540" y="112" text-anchor="middle" font-size="7" fill="#64748B">tensor citra, CNN</text>
  <text x="540" y="126" text-anchor="middle" font-size="7" fill="#64748B">smoke test tiga level</text>

  <!-- W1 → W2 -->
  <path d="M440 100 L458 100" stroke="#475569" stroke-width="1.5" marker-end="url(#arrGray)"/>

  <!-- ROW 2: Core ML (W3-W4) -->
  <rect x="60" y="178" width="175" height="75" rx="8" fill="#065F46" stroke="#10B981" stroke-width="2"/>
  <text x="148" y="198" text-anchor="middle" font-size="10" font-weight="700" fill="white">W3</text>
  <text x="148" y="214" text-anchor="middle" font-size="9" fill="#A7F3D0">Loss, Optimizer &amp; Evaluasi</text>
  <text x="148" y="228" text-anchor="middle" font-size="7" fill="#6EE7B7">galeri 5 run, ablation</text>
  <text x="148" y="242" text-anchor="middle" font-size="7" fill="#6EE7B7">ubah satu hal pada satu waktu</text>

  <rect x="260" y="178" width="175" height="75" rx="8" fill="#065F46" stroke="#10B981" stroke-width="2"/>
  <text x="348" y="198" text-anchor="middle" font-size="10" font-weight="700" fill="white">W4</text>
  <text x="348" y="214" text-anchor="middle" font-size="9" fill="#A7F3D0">Reproducibility &amp; Experiment Matrix</text>
  <text x="348" y="228" text-anchor="middle" font-size="7" fill="#6EE7B7">YAML, seed, checkpoint</text>
  <text x="348" y="242" text-anchor="middle" font-size="7" fill="#6EE7B7">matriks eksperimen</text>

  <rect x="460" y="178" width="175" height="75" rx="8" fill="#92400E" stroke="#F59E0B" stroke-width="2"/>
  <text x="548" y="198" text-anchor="middle" font-size="10" font-weight="700" fill="white">W5</text>
  <text x="548" y="214" text-anchor="middle" font-size="9" fill="#FDE68A">Sequences: RNN &amp; LSTM</text>
  <text x="548" y="228" text-anchor="middle" font-size="7" fill="#FCD34D">BPTT, vanishing gradient</text>
  <text x="548" y="242" text-anchor="middle" font-size="7" fill="#FCD34D">justifikasi arsitektur</text>

  <rect x="660" y="178" width="175" height="75" rx="8" fill="#92400E" stroke="#F59E0B" stroke-width="2"/>
  <text x="748" y="198" text-anchor="middle" font-size="10" font-weight="700" fill="white">W6</text>
  <text x="748" y="214" text-anchor="middle" font-size="9" fill="#FDE68A">Representations &amp; Temporal Leakage</text>
  <text x="748" y="228" text-anchor="middle" font-size="7" fill="#FCD34D">representasi fitur</text>
  <text x="748" y="242" text-anchor="middle" font-size="7" fill="#FCD34D">temporal leakage demo</text>

  <!-- W2 → W3, W4, W5 -->
  <path d="M460 137 L148 176" stroke="#475569" stroke-width="1.2" marker-end="url(#arrGray)"/>
  <path d="M500 137 L348 176" stroke="#475569" stroke-width="1.2" marker-end="url(#arrGray)"/>
  <path d="M540 137 L548 176" stroke="#475569" stroke-width="1.2" marker-end="url(#arrGray)"/>
  <path d="M580 137 L748 176" stroke="#475569" stroke-width="1.2" marker-end="url(#arrGray)"/>

  <!-- ROW 3: Advanced (W7-W9) -->
  <rect x="60" y="298" width="175" height="75" rx="8" fill="#4C1D95" stroke="#8B5CF6" stroke-width="2"/>
  <text x="148" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="white">W7</text>
  <text x="148" y="334" text-anchor="middle" font-size="9" fill="#DDD6FE">Text, Transformers &amp; Repo Adoption</text>
  <text x="148" y="348" text-anchor="middle" font-size="7" fill="#C4B5FD">BERT, fine-tune, AI tools</text>
  <text x="148" y="362" text-anchor="middle" font-size="7" fill="#C4B5FD">adopsi repo riset</text>

  <rect x="260" y="298" width="175" height="75" rx="8" fill="#4C1D95" stroke="#8B5CF6" stroke-width="2"/>
  <text x="348" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="white">W8</text>
  <text x="348" y="334" text-anchor="middle" font-size="9" fill="#DDD6FE">Foundation Models</text>
  <text x="348" y="348" text-anchor="middle" font-size="7" fill="#C4B5FD">taksonomi modalitas</text>
  <text x="348" y="362" text-anchor="middle" font-size="7" fill="#C4B5FD">adaptasi: frozen/LoRA/FT</text>

  <rect x="460" y="298" width="175" height="75" rx="8" fill="#4C1D95" stroke="#8B5CF6" stroke-width="2"/>
  <text x="548" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="white">W9</text>
  <text x="548" y="334" text-anchor="middle" font-size="9" fill="#DDD6FE">Multimodal Reasoning</text>
  <text x="548" y="348" text-anchor="middle" font-size="7" fill="#C4B5FD">fusion strategies</text>
  <text x="548" y="362" text-anchor="middle" font-size="7" fill="#C4B5FD">ablation per modalitas</text>

  <rect x="660" y="298" width="175" height="75" rx="8" fill="#7F1D1D" stroke="#EF4444" stroke-width="2"/>
  <text x="748" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="white">W10</text>
  <text x="748" y="334" text-anchor="middle" font-size="9" fill="#FCA5A5">Paper Reading</text>
  <text x="748" y="348" text-anchor="middle" font-size="7" fill="#F87171">3-pass reading</text>
  <text x="748" y="362" text-anchor="middle" font-size="7" fill="#F87171">paper-to-code workflow</text>

  <!-- W3/W4/W5/W6 → W7/W8/W9/W10 -->
  <path d="M148 253 L148 296" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#arrPurple)"/>
  <path d="M348 253 L348 296" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#arrPurple)"/>
  <path d="M548 253 L548 296" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#arrPurple)"/>
  <path d="M748 253 L748 296" stroke="#EF4444" stroke-width="1.2" marker-end="url(#arrRed)"/>

  <!-- ROW 4: Framing + Capstone -->
  <rect x="260" y="418" width="175" height="75" rx="8" fill="#1C1917" stroke="#78716C" stroke-width="2"/>
  <text x="348" y="438" text-anchor="middle" font-size="10" font-weight="700" fill="white">W11</text>
  <text x="348" y="454" text-anchor="middle" font-size="9" fill="#D6D3D1">Research Framing</text>
  <text x="348" y="468" text-anchor="middle" font-size="7" fill="#A8A29E">Input→Middle→Output</text>
  <text x="348" y="482" text-anchor="middle" font-size="7" fill="#A8A29E">framing menu, literatur triage</text>

  <rect x="460" y="418" width="375" height="75" rx="8" fill="#312E81" stroke="#6366F1" stroke-width="2"/>
  <text x="648" y="438" text-anchor="middle" font-size="10" font-weight="700" fill="white">Capstone W12-W15</text>
  <text x="648" y="454" text-anchor="middle" font-size="9" fill="#C7D2FE">Filter → Rethink → Communicate → Submit</text>
  <text x="570" y="470" text-anchor="middle" font-size="7" fill="#A5B4FC">W12: framing defense + Eks 1</text>
  <text x="570" y="482" text-anchor="middle" font-size="7" fill="#A5B4FC">W13: revisi + Eks 2</text>
  <text x="730" y="470" text-anchor="middle" font-size="7" fill="#A5B4FC">W14: presentasi final 20 mnt</text>
  <text x="730" y="482" text-anchor="middle" font-size="7" fill="#A5B4FC">W15: kumpulkan luaran</text>

  <!-- W7/W8/W9/W10 → W11 -->
  <path d="M148 373 L300 416" stroke="#78716C" stroke-width="1.2" marker-end="url(#arrStone)"/>
  <path d="M348 373 L348 416" stroke="#78716C" stroke-width="1.2" marker-end="url(#arrStone)"/>
  <path d="M548 373 L400 416" stroke="#78716C" stroke-width="1.2" marker-end="url(#arrStone)"/>
  <path d="M748 373 L460 416" stroke="#78716C" stroke-width="1.2" marker-end="url(#arrStone)"/>

  <!-- W11 → Capstone -->
  <path d="M435 456 L458 456" stroke="#6366F1" stroke-width="2" marker-end="url(#arrIndigo)"/>

  <!-- Legend -->
  <rect x="40" y="520" width="820" height="60" rx="6" fill="#F1F5F9" stroke="#E2E8F0"/>
  <text x="54" y="536" font-size="9" font-weight="600" fill="#374151">Jalur pembelajaran:</text>
  <rect x="178" y="528" width="14" height="8" rx="2" fill="#1E293B"/>
  <text x="198" y="538" font-size="8" fill="#374151">Fondasi (W1-W2)</text>
  <rect x="298" y="528" width="14" height="8" rx="2" fill="#065F46"/>
  <text x="318" y="538" font-size="8" fill="#374151">Eksperimen (W3-W4)</text>
  <rect x="428" y="528" width="14" height="8" rx="2" fill="#92400E"/>
  <text x="448" y="538" font-size="8" fill="#374151">Sequence &amp; Repr (W5-W6)</text>
  <rect x="578" y="528" width="14" height="8" rx="2" fill="#4C1D95"/>
  <text x="598" y="538" font-size="8" fill="#374151">Advanced (W7-W9)</text>
  <rect x="698" y="528" width="14" height="8" rx="2" fill="#7F1D1D"/>
  <text x="718" y="538" font-size="8" fill="#374151">Paper (W10)</text>
  <rect x="798" y="528" width="14" height="8" rx="2" fill="#312E81"/>
  <text x="818" y="538" font-size="8" fill="#374151">Capstone</text>
  <text x="54" y="568" font-size="8" fill="#6B7280">13_Rubrik_Penilaian dan 14_Lampiran adalah referensi - bisa dibaca kapanpun.</text>
  <text x="500" y="568" font-size="8" fill="#6B7280">Capstone W12-W15 membutuhkan semua W1-W11.</text>

  <defs>
    <marker id="arrGray" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrPurple" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8B5CF6"/>
    </marker>
    <marker id="arrRed" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EF4444"/>
    </marker>
    <marker id="arrStone" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#78716C"/>
    </marker>
    <marker id="arrIndigo" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6366F1"/>
    </marker>
  </defs>
</svg>
