<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="ui-monospace,Menlo,Monaco,monospace">
  <rect width="640" height="420" fill="#1E1E2E" rx="12"/>
  <text x="320" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#CDD6F4" font-family="ui-sans-serif,system-ui,sans-serif">Struktur Folder Eksperimen</text>

  <!-- experiments/ root -->
  <text x="30" y="60" font-size="13" fill="#89DCEB">experiments/</text>

  <!-- Outer vertical line from root -->
  <line x1="44" y1="70" x2="44" y2="360" stroke="#45475A" stroke-width="1"/>

  <!-- Run folder -->
  <line x1="44" y1="84" x2="60" y2="84" stroke="#45475A" stroke-width="1"/>
  <text x="66" y="88" font-size="12" fill="#F38BA8">baseline_seed42/</text>
  <rect x="390" y="74" width="230" height="18" rx="3" fill="#313244"/>
  <text x="398" y="87" font-size="9" fill="#6C7086">← satu run = satu folder</text>

  <!-- Inner vertical line for contents -->
  <line x1="80" y1="97" x2="80" y2="344" stroke="#45475A" stroke-width="1"/>

  <line x1="80" y1="110" x2="96" y2="110" stroke="#45475A" stroke-width="1"/>
  <text x="102" y="114" font-size="12" fill="#A6E3A1">config.yaml</text>
  <text x="270" y="114" font-size="10" fill="#6C7086">← frozen copy of config</text>

  <line x1="80" y1="134" x2="96" y2="134" stroke="#45475A" stroke-width="1"/>
  <text x="102" y="138" font-size="12" fill="#A6E3A1">train.log</text>
  <text x="210" y="138" font-size="10" fill="#6C7086">← stdout/stderr per epoch</text>

  <line x1="80" y1="158" x2="96" y2="158" stroke="#45475A" stroke-width="1"/>
  <text x="102" y="162" font-size="12" fill="#FAB387">ckpt_best.pt</text>
  <text x="260" y="162" font-size="10" fill="#6C7086">← model dengan val loss terendah</text>

  <line x1="80" y1="182" x2="96" y2="182" stroke="#45475A" stroke-width="1"/>
  <text x="102" y="186" font-size="12" fill="#FAB387">ckpt_last.pt</text>
  <text x="260" y="186" font-size="10" fill="#6C7086">← checkpoint akhir training</text>

  <line x1="80" y1="206" x2="96" y2="206" stroke="#45475A" stroke-width="1"/>
  <text x="102" y="210" font-size="12" fill="#CBA6F7">summary.json</text>
  <text x="260" y="210" font-size="10" fill="#6C7086">← metrik final: acc, loss, time</text>

  <line x1="80" y1="230" x2="96" y2="230" stroke="#45475A" stroke-width="1"/>
  <text x="102" y="234" font-size="12" fill="#89DCEB">tb/</text>
  <text x="138" y="234" font-size="10" fill="#6C7086">← TensorBoard event files</text>

  <line x1="80" y1="254" x2="96" y2="254" stroke="#45475A" stroke-width="1"/>
  <text x="102" y="258" font-size="12" fill="#F9E2AF">commit_hash.txt</text>
  <text x="262" y="258" font-size="10" fill="#6C7086">← git hash saat run dimulai</text>

  <!-- Second run folder and siblings -->
  <line x1="44" y1="282" x2="60" y2="282" stroke="#45475A" stroke-width="1"/>
  <text x="66" y="286" font-size="12" fill="#585B70">focal_freeze_seed42/</text>

  <line x1="44" y1="306" x2="60" y2="306" stroke="#45475A" stroke-width="1"/>
  <text x="66" y="310" font-size="12" fill="#585B70">baseline_seed7/</text>

  <line x1="44" y1="330" x2="60" y2="330" stroke="#45475A" stroke-width="1"/>
  <text x="66" y="334" font-size="12" fill="#585B70">...</text>

  <!-- Bottom panel: checkpoint content -->
  <rect x="30" y="358" width="580" height="44" rx="6" fill="#313244" stroke="#45475A" stroke-width="1"/>
  <text x="320" y="374" text-anchor="middle" font-size="10" fill="#CBA6F7" font-family="ui-sans-serif,system-ui,sans-serif" font-weight="600">Isi checkpoint .pt:</text>
  <text x="320" y="392" text-anchor="middle" font-size="9" fill="#CDD6F4" font-family="ui-sans-serif,system-ui,sans-serif">model_state_dict  |  optimizer_state_dict  |  epoch  |  best_val_loss  |  config  |  git_hash</text>
</svg>
