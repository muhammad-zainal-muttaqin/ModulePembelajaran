<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="ui-sans-serif,system-ui,sans-serif">
  <rect width="900" height="500" fill="#F9FAFB" rx="12"/>
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Kerangka Dekomposisi: Input → Middle → Output</text>
  <text x="450" y="46" text-anchor="middle" font-size="10" fill="#6B7280">Tiga pertanyaan untuk membedah setiap masalah ML sebelum memilih arsitektur</text>

  <!-- === Main Framework === -->
  <g transform="translate(40, 70)">
    <!-- Output box -->
    <rect x="620" y="30" width="200" height="120" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <text x="720" y="60" text-anchor="middle" font-size="14" font-weight="700" fill="#1D4ED8">OUTPUT</text>
    <text x="720" y="80" text-anchor="middle" font-size="10" fill="#6B7280">Apa yang dihasilkan model?</text>
    <line x1="640" y1="90" x2="800" y2="90" stroke="#93C5FD" stroke-width="1"/>
    <text x="720" y="108" text-anchor="middle" font-size="9" fill="#374151">Tensor, shape, semantik</text>
    <text x="720" y="122" text-anchor="middle" font-size="9" fill="#374151">yang sesuai pertanyaan riset</text>
    <text x="720" y="140" text-anchor="middle" font-size="8" fill="#3B82F6" font-weight="600">Pertanyaan 1</text>

    <!-- Input box -->
    <rect x="0" y="30" width="200" height="120" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
    <text x="100" y="60" text-anchor="middle" font-size="14" font-weight="700" fill="#065F46">INPUT</text>
    <text x="100" y="80" text-anchor="middle" font-size="10" fill="#6B7280">Apa yang diterima model?</text>
    <line x1="20" y1="90" x2="180" y2="90" stroke="#6EE7B7" stroke-width="1"/>
    <text x="100" y="108" text-anchor="middle" font-size="9" fill="#374151">Tensor dengan bentuk</text>
    <text x="100" y="122" text-anchor="middle" font-size="9" fill="#374151">yang spesifik</text>
    <text x="100" y="140" text-anchor="middle" font-size="8" fill="#10B981" font-weight="600">Pertanyaan 1</text>

    <!-- Middle box -->
    <rect x="240" y="10" width="340" height="160" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6"/>
    <text x="410" y="40" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E">MIDDLE</text>
    <text x="410" y="60" text-anchor="middle" font-size="10" fill="#6B7280">Apa yang memetakan Input → Output?</text>
    <line x1="260" y1="70" x2="560" y2="70" stroke="#FCD34D" stroke-width="1"/>

    <!-- Middle components -->
    <rect x="260" y="80" width="140" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="330" y="100" text-anchor="middle" font-size="9" font-weight="600" fill="#1D4ED8">Langkah standar</text>
    <text x="330" y="112" text-anchor="middle" font-size="7" fill="#6B7280">Ada di Big Map</text>

    <rect x="420" y="80" width="140" height="40" rx="6" fill="#FFF1F2" stroke="#EF4444" stroke-width="1.5"/>
    <text x="490" y="100" text-anchor="middle" font-size="9" font-weight="600" fill="#991B1B">GAP</text>
    <text x="490" y="112" text-anchor="middle" font-size="7" fill="#6B7280">Belum ada jawaban standar</text>

    <text x="410" y="145" text-anchor="middle" font-size="8" fill="#F59E0B" font-weight="600">Pertanyaan 2</text>
    <text x="410" y="158" text-anchor="middle" font-size="8" fill="#6B7280">Di mana letak gap-nya?</text>

    <!-- Arrows -->
    <path d="M200 90 L240 90" stroke="#374151" stroke-width="2" marker-end="url(#arrowDark)"/>
    <path d="M580 90 L620 90" stroke="#374151" stroke-width="2" marker-end="url(#arrowDark)"/>

    <!-- Labels on arrows -->
    <text x="220" y="82" text-anchor="middle" font-size="8" fill="#6B7280">?</text>
    <text x="600" y="82" text-anchor="middle" font-size="8" fill="#6B7280">?</text>
  </g>

  <!-- === Three Questions === -->
  <g transform="translate(40, 260)">
    <!-- Question 1 -->
    <rect x="0" y="0" width="260" height="110" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
    <rect x="0" y="0" width="260" height="30" rx="8" fill="#1D4ED8"/>
    <rect x="0" y="20" width="260" height="10" fill="#1D4ED8"/>
    <text x="130" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="white">Pertanyaan 1: Entitas, Output, Input</text>
    <text x="130" y="50" text-anchor="middle" font-size="9" fill="#374151">"Apa yang diprediksi, tentang apa, dari apa?"</text>
    <line x1="20" y1="58" x2="240" y2="58" stroke="#BFDBFE" stroke-width="1"/>
    <text x="130" y="75" text-anchor="middle" font-size="8" fill="#6B7280">Subjek: entitas/fenomena yang dipelajari</text>
    <text x="130" y="88" text-anchor="middle" font-size="8" fill="#6B7280">Predikat: apa yang ingin diketahui</text>
    <text x="130" y="101" text-anchor="middle" font-size="8" fill="#6B7280">Tipe jawaban: seperti apa output-nya</text>

    <!-- Question 2 -->
    <rect x="290" y="0" width="260" height="110" rx="8" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
    <rect x="290" y="0" width="260" height="30" rx="8" fill="#92400E"/>
    <rect x="290" y="20" width="260" height="10" fill="#92400E"/>
    <text x="420" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="white">Pertanyaan 2: Peta Middle + Gap</text>
    <text x="420" y="50" text-anchor="middle" font-size="9" fill="#374151">"Seperti apa Middle-nya, di mana gap-nya?"</text>
    <line x1="310" y1="58" x2="530" y2="58" stroke="#FDE68A" stroke-width="1"/>
    <text x="420" y="75" text-anchor="middle" font-size="8" fill="#6B7280">Langkah mana yang sudah standar?</text>
    <text x="420" y="88" text-anchor="middle" font-size="8" fill="#6B7280">Langkah mana yang belum ada solusi?</text>
    <text x="420" y="101" text-anchor="middle" font-size="8" fill="#92400E" font-weight="600">Gap = kontribusi riset hidup di sini</text>

    <!-- Question 3 -->
    <rect x="580" y="0" width="260" height="110" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
    <rect x="580" y="0" width="260" height="30" rx="8" fill="#065F46"/>
    <rect x="580" y="20" width="260" height="10" fill="#065F46"/>
    <text x="710" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="white">Pertanyaan 3: Validasi Gap</text>
    <text x="710" y="50" text-anchor="middle" font-size="9" fill="#374151">"Apakah gap-nya benar-benar ada?"</text>
    <line x1="600" y1="58" x2="820" y2="58" stroke="#A7F3D0" stroke-width="1"/>
    <text x="710" y="75" text-anchor="middle" font-size="8" fill="#6B7280">Cek literatur: sudah ada solusi?</text>
    <text x="710" y="88" text-anchor="middle" font-size="8" fill="#6B7280">Kalau sudah ada: apa yang bisa diperbaiki?</text>
    <text x="710" y="101" text-anchor="middle" font-size="8" fill="#065F46" font-weight="600">Gap nyata vs gap semu</text>
  </g>

  <!-- === Example box === -->
  <g transform="translate(40, 390)">
    <rect x="0" y="0" width="800" height="90" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="400" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#4C1D95">Contoh: Klasifikasi Penyakit Padi</text>
    <line x1="20" y1="30" x2="780" y2="30" stroke="#DDD6FE" stroke-width="1"/>
    
    <text x="130" y="50" text-anchor="middle" font-size="9" fill="#1D4ED8" font-weight="600">INPUT</text>
    <text x="130" y="65" text-anchor="middle" font-size="8" fill="#6B7280">Gambar daun (3, 224, 224)</text>

    <text x="400" y="50" text-anchor="middle" font-size="9" fill="#92400E" font-weight="600">MIDDLE</text>
    <text x="400" y="65" text-anchor="middle" font-size="8" fill="#6B7280">CNN backbone → GAP → classifier</text>
    <text x="400" y="78" text-anchor="middle" font-size="7" fill="#EF4444">Gap: "apakah 13 kelas atau 5 kelompok lebih baik untuk triase?"</text>

    <text x="670" y="50" text-anchor="middle" font-size="9" fill="#065F46" font-weight="600">OUTPUT</text>
    <text x="670" y="65" text-anchor="middle" font-size="8" fill="#6B7280">Probabilitas 5 kelompok (softmax)</text>
  </g>

  <defs>
    <marker id="arrowDark" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#374151"/>
    </marker>
  </defs>
</svg>
