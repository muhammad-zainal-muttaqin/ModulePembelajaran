  <text x="303" y="304" text-anchor="middle" font-size="7" fill="#F87171">3-pass reading</text>
  <text x="303" y="316" text-anchor="middle" font-size="7" fill="#F87171">paper-to-code workflow</text>

  <path d="M388 289 L406 289" stroke="#EF4444" stroke-width="2" marker-end="url(#arrRed)"/>

  <rect x="406" y="254" width="170" height="70" rx="8" fill="#1C1917" stroke="#78716C" stroke-width="2"/>
  <text x="491" y="274" text-anchor="middle" font-size="11" font-weight="700" fill="white">W11</text>
  <text x="491" y="290" text-anchor="middle" font-size="8" fill="#D6D3D1">Research Framing</text>
  <text x="491" y="304" text-anchor="middle" font-size="7" fill="#A8A29E">Input→Middle→Output</text>
  <text x="491" y="316" text-anchor="middle" font-size="7" fill="#A8A29E">framing menu, literatur triage</text>

  <!-- ROW 4: Capstone W12-W15 (spanning) -->
  <rect x="30" y="350" width="734" height="70" rx="8" fill="#312E81" stroke="#6366F1" stroke-width="2"/>
