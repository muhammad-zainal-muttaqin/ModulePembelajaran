  <text x="397" y="386" text-anchor="middle" font-size="9" fill="#C7D2FE">Filter → Rethink → Communicate → Submit</text>
  <text x="160" y="402" text-anchor="middle" font-size="8" fill="#A5B4FC">W12: framing defense + Eks 1</text>
  <text x="370" y="402" text-anchor="middle" font-size="8" fill="#A5B4FC">W13: revisi + Eks 2</text>
  <text x="560" y="402" text-anchor="middle" font-size="8" fill="#A5B4FC">W14: presentasi final 20 mnt</text>
  <text x="700" y="402" text-anchor="middle" font-size="8" fill="#A5B4FC">W15: kumpulkan luaran</text>

  <!-- W11 → Capstone -->
  <path d="M491 324 L491 348" stroke="#6366F1" stroke-width="2" marker-end="url(#arrIndigo)"/>

