  <text x="679" y="98" text-anchor="middle" font-size="8" fill="#A7F3D0">Reproducibility</text>
  <text x="679" y="112" text-anchor="middle" font-size="7" fill="#6EE7B7">YAML, seed, checkpoint</text>
  <text x="679" y="124" text-anchor="middle" font-size="7" fill="#6EE7B7">matriks eksperimen</text>

  <!-- ROW 2: W5 → W6 → W7 → W8 -->
  <rect x="30" y="158" width="170" height="70" rx="8" fill="#92400E" stroke="#F59E0B" stroke-width="2"/>
