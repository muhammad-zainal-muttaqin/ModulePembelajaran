  <text x="115" y="290" text-anchor="middle" font-size="8" fill="#DDD6FE">Multimodal Reasoning</text>
  <text x="115" y="304" text-anchor="middle" font-size="7" fill="#C4B5FD">fusion strategies</text>
  <text x="115" y="316" text-anchor="middle" font-size="7" fill="#C4B5FD">ablation per modalitas</text>

