  <text x="679" y="194" text-anchor="middle" font-size="8" fill="#DDD6FE">Foundation Models</text>
  <text x="679" y="208" text-anchor="middle" font-size="7" fill="#C4B5FD">taksonomi modalitas</text>
  <text x="679" y="220" text-anchor="middle" font-size="7" fill="#C4B5FD">adaptasi: frozen/LoRA/FT</text>

  <!-- ROW 3: W9 → W10 → W11 → (gap) -->
