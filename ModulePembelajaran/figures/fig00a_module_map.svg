  <rect x="424" y="451" width="12" height="7" rx="2" fill="#312E81"/>
  <text x="442" y="459" font-size="7" fill="#374151">Capstone</text>
  <text x="520" y="459" font-size="7" fill="#6B7280">15_Panduan_Instruktur</text>

