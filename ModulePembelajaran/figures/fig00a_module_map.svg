  <text x="491" y="220" text-anchor="middle" font-size="7" fill="#C4B5FD">adopsi repo riset</text>

  <path d="M576 193 L594 193" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrPurple)"/>

  <rect x="594" y="158" width="170" height="70" rx="8" fill="#4C1D95" stroke="#8B5CF6" stroke-width="2"/>
