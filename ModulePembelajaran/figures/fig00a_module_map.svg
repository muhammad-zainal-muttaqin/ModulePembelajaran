<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="ui-sans-serif,system-ui,sans-serif">
  <rect width="920" height="480" fill="#FAFAFA" rx="12"/>
  <text x="460" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Peta Modul Pembelajaran: 11 Minggu Bootcamp + 4 Minggu Capstone</text>
  <text x="460" y="44" text-anchor="middle" font-size="10" fill="#6B7280">Urutan linier W1 → W11, lalu Capstone W12-W15. Panah = prereq.</text>

  <!-- ROW 1: W1 → W2 → W3 → W4 -->
  <rect x="30" y="62" width="170" height="70" rx="8" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  <text x="115" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#F8FAFC">W1</text>
  <text x="115" y="98" text-anchor="middle" font-size="8" fill="#94A3B8">Tabular &amp; Output Heads</text>
  <text x="115" y="112" text-anchor="middle" font-size="7" fill="#64748B">MLP, loss matching</text>
  <text x="115" y="124" text-anchor="middle" font-size="7" fill="#64748B">observasi sebelum kesimpulan</text>

  <path d="M200 97 L218 97" stroke="#475569" stroke-width="2" marker-end="url(#arrGray)"/>

  <rect x="218" y="62" width="170" height="70" rx="8" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  <text x="303" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#F8FAFC">W2</text>
  <text x="303" y="98" text-anchor="middle" font-size="8" fill="#94A3B8">Images, CNN &amp; Smoke Test</text>
  <text x="303" y="112" text-anchor="middle" font-size="7" fill="#64748B">tensor citra, CNN</text>
  <text x="303" y="124" text-anchor="middle" font-size="7" fill="#64748B">smoke test tiga level</text>

  <path d="M388 97 L406 97" stroke="#475569" stroke-width="2" marker-end="url(#arrGray)"/>

  <rect x="406" y="62" width="170" height="70" rx="8" fill="#065F46" stroke="#10B981" stroke-width="2"/>
  <text x="491" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="white">W3</text>
  <text x="491" y="98" text-anchor="middle" font-size="8" fill="#A7F3D0">Loss, Optimizer &amp; Evaluasi</text>
  <text x="491" y="112" text-anchor="middle" font-size="7" fill="#6EE7B7">galeri 5 run, ablation</text>
  <text x="491" y="124" text-anchor="middle" font-size="7" fill="#6EE7B7">ubah satu hal pada satu waktu</text>

