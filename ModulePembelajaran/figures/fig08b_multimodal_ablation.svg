<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <marker id="check" markerWidth="10" markerHeight="8" refX="5" refY="4">
      <path d="M0 4 L3.5 7.5 L10 1" fill="none" stroke="#059669" stroke-width="2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="14" font-weight="700" font-family="system-ui,sans-serif" fill="#1E293B">Protokol Ablasi Per Modalitas — 7 Kondisi</text>

  <!-- Header row: modality icons -->
  <text x="208" y="62" text-anchor="middle" font-size="11" font-weight="600" font-family="system-ui,sans-serif" fill="#475569">Eksperimen</text>
  <!-- Modality column headers -->
  <g transform="translate(350, 40)"><rect x="0" y="0" width="80" height="28" rx="6" fill="#3B82F6"/><text x="40" y="19" text-anchor="middle" font-size="11" font-family="system-ui,sans-serif" fill="white">Image</text></g>
  <g transform="translate(450, 40)"><rect x="0" y="0" width="80" height="28" rx="6" fill="#8B5CF6"/><text x="40" y="19" text-anchor="middle" font-size="11" font-family="system-ui,sans-serif" fill="white">Text</text></g>
  <g transform="translate(550, 40)"><rect x="0" y="0" width="80" height="28" rx="6" fill="#F59E0B"/><text x="40" y="19" text-anchor="middle" font-size="11" font-family="system-ui,sans-serif" fill="white">Sensor</text></g>
  <text x="720" y="59" text-anchor="middle" font-size="11" font-weight="600" font-family="system-ui,sans-serif" fill="#475569">Hasil</text>

  <!-- Separator -->
  <line x1="40" y1="72" x2="760" y2="72" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Row data -->
  <!-- 1. Full model -->
  <text x="40" y="94" font-size="11" font-family="'Courier New',monospace" fill="#1E293B">1. Full model</text>
  <rect x="350" y="80" width="80" height="22" rx="4" fill="#3B82F6" opacity="1"/>
  <text x="390" y="96" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="white">✓</text>
  <rect x="450" y="80" width="80" height="22" rx="4" fill="#8B5CF6" opacity="1"/>
  <text x="490" y="96" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="white">✓</text>
  <rect x="550" y="80" width="80" height="22" rx="4" fill="#F59E0B" opacity="1"/>
  <text x="590" y="96" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="white">✓</text>
  <text x="720" y="96" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#64748B">baseline</text>

  <!-- 2. Image only -->
  <text x="40" y="124" font-size="11" font-family="'Courier New',monospace" fill="#1E293B">2. Image only</text>
  <rect x="350" y="110" width="80" height="22" rx="4" fill="#3B82F6" opacity="1"/>
  <text x="390" y="126" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="white">✓</text>
  <rect x="450" y="110" width="80" height="22" rx="4" fill="#CBD5E1" opacity="1"/>
  <text x="490" y="126" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#94A3B8">—</text>
  <rect x="550" y="110" width="80" height="22" rx="4" fill="#CBD5E1" opacity="1"/>
  <text x="590" y="126" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#94A3B8">—</text>
  <text x="720" y="126" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#64748B">batas img</text>

  <!-- 3. Text only -->
  <text x="40" y="154" font-size="11" font-family="'Courier New',monospace" fill="#1E293B">3. Text only</text>
  <rect x="350" y="140" width="80" height="22" rx="4" fill="#CBD5E1" opacity="1"/>
  <text x="390" y="156" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#94A3B8">—</text>
  <rect x="450" y="140" width="80" height="22" rx="4" fill="#8B5CF6" opacity="1"/>
  <text x="490" y="156" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="white">✓</text>
  <rect x="550" y="140" width="80" height="22" rx="4" fill="#CBD5E1" opacity="1"/>
  <text x="590" y="156" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#94A3B8">—</text>
  <text x="720" y="156" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#64748B">batas txt</text>

  <!-- 4. Sensor only -->
  <text x="40" y="184" font-size="11" font-family="'Courier New',monospace" fill="#1E293B">4. Sensor only</text>
  <rect x="350" y="170" width="80" height="22" rx="4" fill="#CBD5E1" opacity="1"/>
  <text x="390" y="186" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#94A3B8">—</text>
  <rect x="450" y="170" width="80" height="22" rx="4" fill="#CBD5E1" opacity="1"/>
  <text x="490" y="186" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#94A3B8">—</text>
  <rect x="550" y="170" width="80" height="22" rx="4" fill="#F59E0B" opacity="1"/>
  <text x="590" y="186" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="white">✓</text>
  <text x="720" y="186" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#64748B">batas sens</text>

  <!-- Divider -->
  <line x1="40" y1="198" x2="760" y2="198" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 5. Image + Text -->
  <text x="40" y="218" font-size="11" font-family="'Courier New',monospace" fill="#1E293B">5. Image + Text</text>
  <rect x="350" y="204" width="80" height="22" rx="4" fill="#3B82F6" opacity="1"/>
  <text x="390" y="220" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="white">✓</text>
  <rect x="450" y="204" width="80" height="22" rx="4" fill="#8B5CF6" opacity="1"/>
  <text x="490" y="220" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="white">✓</text>
  <rect x="550" y="204" width="80" height="22" rx="4" fill="#CBD5E1" opacity="1"/>
  <text x="590" y="220" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#94A3B8">—</text>
  <text x="720" y="220" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#64748B">sensor berguna?</text>

  <!-- 6. Image + Sensor -->
  <text x="40" y="248" font-size="11" font-family="'Courier New',monospace" fill="#1E293B">6. Image + Sensor</text>
  <rect x="350" y="234" width="80" height="22" rx="4" fill="#3B82F6" opacity="1"/>
  <text x="390" y="250" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="white">✓</text>
  <rect x="450" y="234" width="80" height="22" rx="4" fill="#CBD5E1" opacity="1"/>
  <text x="490" y="250" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#94A3B8">—</text>
  <rect x="550" y="234" width="80" height="22" rx="4" fill="#F59E0B" opacity="1"/>
  <text x="590" y="250" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="white">✓</text>
  <text x="720" y="250" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#64748B">teks berguna?</text>

  <!-- 7. Text + Sensor -->
  <text x="40" y="278" font-size="11" font-family="'Courier New',monospace" fill="#1E293B">7. Text + Sensor</text>
  <rect x="350" y="264" width="80" height="22" rx="4" fill="#CBD5E1" opacity="1"/>
  <text x="390" y="280" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#94A3B8">—</text>
  <rect x="450" y="264" width="80" height="22" rx="4" fill="#8B5CF6" opacity="1"/>
  <text x="490" y="280" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="white">✓</text>
  <rect x="550" y="264" width="80" height="22" rx="4" fill="#F59E0B" opacity="1"/>
  <text x="590" y="280" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="white">✓</text>
  <text x="720" y="280" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#64748B">image berguna?</text>

  <!-- Divider -->
  <line x1="40" y1="296" x2="760" y2="296" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 8. Random Image (warning row) -->
  <rect x="28" y="300" width="748" height="28" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="40" y="319" font-size="11" font-family="'Courier New',monospace" fill="#1E293B">⚠ Random image</text>
  <rect x="350" y="304" width="80" height="22" rx="4" fill="#EF4444" opacity="0.85"/>
  <text x="390" y="320" text-anchor="middle" font-size="9" font-family="system-ui,sans-serif" fill="white">random</text>
  <rect x="450" y="304" width="80" height="22" rx="4" fill="#8B5CF6" opacity="1"/>
  <text x="490" y="320" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="white">✓</text>
  <rect x="550" y="304" width="80" height="22" rx="4" fill="#F59E0B" opacity="1"/>
  <text x="590" y="320" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="white">✓</text>
  <text x="720" y="320" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#92400E">cek: image dipakai?</text>

  <!-- Explanation zone -->
  <rect x="40" y="350" width="720" height="52" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="400" y="372" text-anchor="middle" font-size="11" font-weight="600" font-family="system-ui,sans-serif" fill="#166534">Interpretasi</text>
  <text x="400" y="390" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#15803D">Jika "Image only" ≈ Full model → modalitas lain diabaikan | Jika "Random image" ≈ Full model → image tidak digunakan</text>

  <!-- Minimum version callout -->
  <rect x="40" y="416" width="720" height="42" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="400" y="436" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#475569">Untuk capstone 3–4 minggu: <tspan font-weight="700" fill="#1E293B">5 kondisi minimum</tspan> (Full model + Image only + Sensor only + Image+Sensor + Random image) sudah informatif.</text>
  <text x="400" y="452" text-anchor="middle" font-size="9" font-family="system-ui,sans-serif" fill="#94A3B8">Protokol 7-kondisi penuh direkomendasikan untuk laporan paper / capstone akhir.</text>

</svg>
