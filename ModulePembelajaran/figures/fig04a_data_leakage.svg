<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="ui-sans-serif,system-ui,sans-serif">
  <rect width="960" height="320" fill="#F9FAFB" rx="12"/>
  <text x="480" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">5 Tipe Data Leakage</text>
  <text x="480" y="46" text-anchor="middle" font-size="10" fill="#6B7280">Leakage = informasi yang tidak seharusnya tersedia saat prediksi bocor ke training</text>

  <!-- TYPE 1: Target -->
  <rect x="12" y="60" width="178" height="248" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <rect x="12" y="60" width="178" height="36" rx="8" fill="#EF4444"/>
  <rect x="12" y="84" width="178" height="12" fill="#EF4444"/>
  <text x="101" y="81" text-anchor="middle" font-size="11" font-weight="700" fill="white">1. Target Leakage</text>
  <text x="101" y="110" text-anchor="middle" font-size="9" fill="#374151">Fitur berasal dari</text>
  <text x="101" y="124" text-anchor="middle" font-size="9" fill="#374151">informasi masa depan</text>
  <line x1="44" y1="158" x2="168" y2="158" stroke="#9CA3AF" stroke-width="1.5"/>
  <circle cx="74" cy="158" r="10" fill="#3B82F6"/>
  <circle cx="144" cy="158" r="10" fill="#EF4444"/>
  <text x="74" y="178" text-anchor="middle" font-size="8" fill="#374151">train t</text>
  <text x="144" y="178" text-anchor="middle" font-size="8" fill="#EF4444">target t+1</text>
  <path d="M144 148 Q108 128 74 148" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#arrowR)"/>
  <text x="108" y="132" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="600">bocor!</text>
  <line x1="22" y1="196" x2="180" y2="196" stroke="#FCA5A5" stroke-width="1"/>
  <text x="101" y="212" text-anchor="middle" font-size="8" font-style="italic" fill="#374151">Contoh: fitur obat yang</text>
  <text x="101" y="225" text-anchor="middle" font-size="8" fill="#374151">diresepkan di prediksi</text>
  <text x="101" y="238" text-anchor="middle" font-size="8" fill="#374151">penyakit (resep ada setelah</text>
  <text x="101" y="251" text-anchor="middle" font-size="8" fill="#374151">diagnosis)</text>
  <text x="101" y="268" text-anchor="middle" font-size="9" font-weight="600" fill="#EF4444">Fix: tanya apakah fitur</text>
  <text x="101" y="282" text-anchor="middle" font-size="9" fill="#374151">tersedia saat prediksi?</text>

  <!-- TYPE 2: Temporal -->
  <rect x="202" y="60" width="178" height="248" rx="8" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <rect x="202" y="60" width="178" height="36" rx="8" fill="#F59E0B"/>
  <rect x="202" y="84" width="178" height="12" fill="#F59E0B"/>
  <text x="291" y="81" text-anchor="middle" font-size="11" font-weight="700" fill="white">2. Temporal Leakage</text>
  <text x="291" y="110" text-anchor="middle" font-size="9" fill="#374151">Data masa depan masuk</text>
  <text x="291" y="124" text-anchor="middle" font-size="9" fill="#374151">ke set training</text>
  <rect x="224" y="136" width="74" height="28" rx="3" fill="#3B82F6" opacity="0.7"/>
  <rect x="302" y="136" width="62" height="28" rx="3" fill="#EF4444" opacity="0.6"/>
  <text x="261" y="154" text-anchor="middle" font-size="9" fill="white" font-weight="600">Train</text>
  <text x="333" y="154" text-anchor="middle" font-size="9" fill="white" font-weight="600">Test</text>
  <path d="M312 136 L280 136 L280 132 L312 132" fill="none" stroke="#EF4444" stroke-width="1.5"/>
  <path d="M284 130 L284 122" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="291" y="118" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="600">bocor!</text>
  <line x1="212" y1="180" x2="370" y2="180" stroke="#FDE68A" stroke-width="1"/>
  <text x="291" y="196" text-anchor="middle" font-size="8" font-style="italic" fill="#374151">Contoh: random shuffle</text>
  <text x="291" y="209" text-anchor="middle" font-size="8" fill="#374151">sebelum split pada data</text>
  <text x="291" y="222" text-anchor="middle" font-size="8" fill="#374151">time-series</text>
  <text x="291" y="248" text-anchor="middle" font-size="9" font-weight="600" fill="#F59E0B">Fix: split berdasarkan</text>
  <text x="291" y="262" text-anchor="middle" font-size="9" fill="#374151">waktu, jangan shuffle</text>
  <text x="291" y="276" text-anchor="middle" font-size="9" fill="#374151">time-series sebelum split</text>

  <!-- TYPE 3: Group -->
  <rect x="392" y="60" width="178" height="248" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="2"/>
  <rect x="392" y="60" width="178" height="36" rx="8" fill="#10B981"/>
  <rect x="392" y="84" width="178" height="12" fill="#10B981"/>
  <text x="481" y="81" text-anchor="middle" font-size="11" font-weight="700" fill="white">3. Group Leakage</text>
  <text x="481" y="110" text-anchor="middle" font-size="9" fill="#374151">Entitas yang sama di</text>
  <text x="481" y="124" text-anchor="middle" font-size="9" fill="#374151">train dan test</text>
  <g transform="translate(410,136)">
    <rect x="0" y="0" width="50" height="28" rx="3" fill="#34D399" opacity="0.8"/>
    <text x="25" y="18" text-anchor="middle" font-size="9" fill="#065F46" font-weight="600">Train</text>
    <rect x="92" y="0" width="50" height="28" rx="3" fill="#EF4444" opacity="0.6"/>
    <text x="117" y="18" text-anchor="middle" font-size="9" fill="white" font-weight="600">Test</text>
    <circle cx="25" cy="52" r="12" fill="#3B82F6"/>
    <text x="25" y="56" text-anchor="middle" font-size="9" fill="white" font-weight="600">P1</text>
    <circle cx="117" cy="52" r="12" fill="#3B82F6"/>
    <text x="117" y="56" text-anchor="middle" font-size="9" fill="white" font-weight="600">P1</text>
    <line x1="37" y1="52" x2="105" y2="52" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3"/>
    <text x="71" y="46" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="600">sama!</text>
  </g>
  <line x1="402" y1="212" x2="560" y2="212" stroke="#A7F3D0" stroke-width="1"/>
  <text x="481" y="228" text-anchor="middle" font-size="8" font-style="italic" fill="#374151">Contoh: pasien yang sama</text>
  <text x="481" y="241" text-anchor="middle" font-size="8" fill="#374151">punya data di train dan</text>
  <text x="481" y="254" text-anchor="middle" font-size="8" fill="#374151">test (medical imaging)</text>
  <text x="481" y="272" text-anchor="middle" font-size="9" font-weight="600" fill="#10B981">Fix: GroupShuffleSplit</text>
  <text x="481" y="286" text-anchor="middle" font-size="9" fill="#374151">per ID pasien / entitas</text>

  <!-- TYPE 4: Preprocessing -->
  <rect x="582" y="60" width="178" height="248" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <rect x="582" y="60" width="178" height="36" rx="8" fill="#3B82F6"/>
  <rect x="582" y="84" width="178" height="12" fill="#3B82F6"/>
  <text x="671" y="81" text-anchor="middle" font-size="10" font-weight="700" fill="white">4. Preprocessing Leakage</text>
  <text x="671" y="110" text-anchor="middle" font-size="9" fill="#374151">Scaler di-fit pada</text>
  <text x="671" y="124" text-anchor="middle" font-size="9" fill="#374151">seluruh dataset</text>
  <!-- code snippet -->
  <rect x="598" y="134" width="148" height="62" rx="4" fill="#1E1E2E"/>
  <text x="606" y="150" font-size="8.5" fill="#EF4444" font-family="ui-monospace,monospace">✗ SALAH:</text>
  <text x="606" y="164" font-size="8" fill="#A6E3A1" font-family="ui-monospace,monospace">scaler.fit(X_all)</text>
  <text x="606" y="178" font-size="8" fill="#A6E3A1" font-family="ui-monospace,monospace">transform(X_train)</text>
  <rect x="598" y="202" width="148" height="50" rx="4" fill="#1E1E2E"/>
  <text x="606" y="218" font-size="8.5" fill="#A6E3A1" font-family="ui-monospace,monospace">✓ BENAR:</text>
  <text x="606" y="232" font-size="8" fill="#CDD6F4" font-family="ui-monospace,monospace">scaler.fit(X_train)</text>
  <text x="606" y="246" font-size="8" fill="#CDD6F4" font-family="ui-monospace,monospace">transform(X_val)</text>
  <line x1="592" y1="260" x2="750" y2="260" stroke="#BFDBFE" stroke-width="1"/>
  <text x="671" y="276" text-anchor="middle" font-size="9" font-weight="600" fill="#3B82F6">Fix: fit HANYA</text>
  <text x="671" y="290" text-anchor="middle" font-size="9" fill="#374151">pada train split</text>

  <!-- TYPE 5: Test Contamination -->
  <rect x="772" y="60" width="176" height="248" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <rect x="772" y="60" width="176" height="36" rx="8" fill="#8B5CF6"/>
  <rect x="772" y="84" width="176" height="12" fill="#8B5CF6"/>
  <text x="860" y="81" text-anchor="middle" font-size="10" font-weight="700" fill="white">5. Test Contamination</text>
  <text x="860" y="110" text-anchor="middle" font-size="9" fill="#374151">Test set diintip untuk</text>
  <text x="860" y="124" text-anchor="middle" font-size="9" fill="#374151">pilih hyperparameter</text>
  <rect x="790" y="136" width="68" height="26" rx="3" fill="#C4B5FD" opacity="0.8"/>
  <text x="824" y="153" text-anchor="middle" font-size="9" fill="#4C1D95" font-weight="600">HP search</text>
  <line x1="858" y1="149" x2="874" y2="149" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrowP)"/>
  <rect x="876" y="136" width="58" height="26" rx="3" fill="#EF4444" opacity="0.6"/>
  <text x="905" y="153" text-anchor="middle" font-size="9" fill="white" font-weight="600">Test!</text>
  <path d="M905 162 L905 176 L824 176 L824 164" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#arrowR)"/>
  <text x="860" y="192" text-anchor="middle" font-size="8" fill="#EF4444" font-weight="600">bocor: test untuk tuning!</text>
  <line x1="782" y1="204" x2="938" y2="204" stroke="#DDD6FE" stroke-width="1"/>
  <text x="860" y="220" text-anchor="middle" font-size="8" font-style="italic" fill="#374151">Contoh: pilih threshold</text>
  <text x="860" y="233" text-anchor="middle" font-size="8" fill="#374151">berdasarkan hasil test</text>
  <text x="860" y="246" text-anchor="middle" font-size="8" fill="#374151">kemudian laporkan acc</text>
  <text x="860" y="259" text-anchor="middle" font-size="8" fill="#374151">pada test yang sama</text>
  <text x="860" y="276" text-anchor="middle" font-size="9" font-weight="600" fill="#8B5CF6">Fix: HP via val set saja</text>
  <text x="860" y="290" text-anchor="middle" font-size="9" fill="#374151">Test hanya sekali di akhir</text>

  <defs>
    <marker id="arrowR" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#EF4444"/>
    </marker>
    <marker id="arrowP" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8B5CF6"/>
    </marker>
  </defs>
</svg>
