<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" font-family="ui-sans-serif,system-ui,sans-serif">
  <rect width="700" height="440" fill="#F9FAFB" rx="12"/>
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Urutan Membaca Repository Riset</text>
  <text x="350" y="46" text-anchor="middle" font-size="10" fill="#6B7280">Ikuti urutan ini: orientasi cepat tanpa tersesat di kode</text>

  <!-- Step 1 -->
  <rect x="30" y="60" width="640" height="48" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <circle cx="62" cy="84" r="18" fill="#3B82F6"/>
  <text x="62" y="89" text-anchor="middle" font-size="14" font-weight="700" fill="white">1</text>
  <text x="100" y="78" font-size="12" font-weight="700" fill="#1D4ED8">README.md</text>
  <text x="100" y="96" font-size="10" fill="#374151">Tujuan repo, cara install, cara run. Gambaran besar dalam 5 menit.</text>
  <text x="654" y="88" text-anchor="end" font-size="9" fill="#6B7280" font-style="italic">5 menit</text>

  <path d="M350 108 L350 120" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrowGray)"/>

  <!-- Step 2 -->
  <rect x="30" y="122" width="640" height="48" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="2"/>
  <circle cx="62" cy="146" r="18" fill="#10B981"/>
  <text x="62" y="151" text-anchor="middle" font-size="14" font-weight="700" fill="white">2</text>
  <text x="100" y="140" font-size="12" font-weight="700" fill="#065F46">Struktur folder</text>
  <text x="100" y="158" font-size="10" fill="#374151">ls -la atau tree. Identifikasi: src/, configs/, experiments/, notebooks/.</text>
  <text x="654" y="150" text-anchor="end" font-size="9" fill="#6B7280" font-style="italic">2 menit</text>

  <path d="M350 170 L350 182" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrowGray)"/>

  <!-- Step 3 -->
  <rect x="30" y="184" width="640" height="48" rx="8" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="62" cy="208" r="18" fill="#F59E0B"/>
  <text x="62" y="213" text-anchor="middle" font-size="14" font-weight="700" fill="white">3</text>
  <text x="100" y="202" font-size="12" font-weight="700" fill="#92400E">Entry point (train.py / main.py)</text>
  <text x="100" y="220" font-size="10" fill="#374151">Titik masuk eksperimen. Lihat argumen CLI dan cara config dimuat.</text>
  <text x="654" y="212" text-anchor="end" font-size="9" fill="#6B7280" font-style="italic">10 menit</text>

  <path d="M350 232 L350 244" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrowGray)"/>

  <!-- Step 4 -->
  <rect x="30" y="246" width="640" height="48" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="62" cy="270" r="18" fill="#8B5CF6"/>
  <text x="62" y="275" text-anchor="middle" font-size="14" font-weight="700" fill="white">4</text>
  <text x="100" y="264" font-size="12" font-weight="700" fill="#4C1D95">Model (models.py / model/)</text>
  <text x="100" y="282" font-size="10" fill="#374151">Baca __init__ dan forward(). Hitung output shape manual untuk verifikasi.</text>
  <text x="654" y="274" text-anchor="end" font-size="9" fill="#6B7280" font-style="italic">20 menit</text>

  <path d="M350 294 L350 306" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrowGray)"/>

  <!-- Steps 5 & 6 side by side -->
  <rect x="30" y="308" width="304" height="48" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <circle cx="62" cy="332" r="18" fill="#EF4444"/>
  <text x="62" y="337" text-anchor="middle" font-size="14" font-weight="700" fill="white">5</text>
  <text x="100" y="326" font-size="12" font-weight="700" fill="#991B1B">Loss + Optimizer</text>
  <text x="100" y="344" font-size="10" fill="#374151">Cek criterion dan optimizer.</text>
  <text x="320" y="336" text-anchor="end" font-size="9" fill="#6B7280" font-style="italic">5 menit</text>

  <path d="M336 332 L352 332" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrowGray)"/>

  <rect x="356" y="308" width="314" height="48" rx="8" fill="#FFF1F2" stroke="#F43F5E" stroke-width="2"/>
  <circle cx="388" cy="332" r="18" fill="#F43F5E"/>
  <text x="388" y="337" text-anchor="middle" font-size="14" font-weight="700" fill="white">6</text>
  <text x="426" y="326" font-size="12" font-weight="700" fill="#9F1239">Data loader</text>
  <text x="426" y="344" font-size="10" fill="#374151">Cek preprocessing dan augmentasi.</text>
  <text x="654" y="336" text-anchor="end" font-size="9" fill="#6B7280" font-style="italic">10 menit</text>

  <path d="M350 356 L350 368" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrowGray)"/>

  <!-- Step 7 -->
  <rect x="30" y="370" width="640" height="48" rx="8" fill="#1F2937" stroke="#374151" stroke-width="2"/>
  <circle cx="62" cy="394" r="18" fill="#374151"/>
  <text x="62" y="399" text-anchor="middle" font-size="14" font-weight="700" fill="white">7</text>
  <text x="100" y="388" font-size="12" font-weight="700" fill="#F9FAFB">Config (YAML / argparse)</text>
  <text x="100" y="406" font-size="10" fill="#9CA3AF">Pahami semua hyperparameter. Ini yang akan kamu ubah saat ablation.</text>
  <text x="654" y="398" text-anchor="end" font-size="9" fill="#6B7280" font-style="italic">5 menit</text>

  <!-- Total time note -->
  <rect x="30" y="426" width="640" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="30" y="426" width="384" height="8" rx="4" fill="#3B82F6" opacity="0.7"/>
  <text x="350" y="438" text-anchor="middle" font-size="8" fill="#6B7280">Total: ~57 menit orientasi sebelum pip install</text>

  <defs>
    <marker id="arrowGray" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9CA3AF"/>
    </marker>
  </defs>
</svg>
